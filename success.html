<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application Submitted</title>
    <style>
        body {
            margin: 0;
            background: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
        }
        .box {
            text-align: center;
            padding: 40px;
            border-radius: 12px;
            background: #3a13e7;
            box-shadow: 0 4px 12px rgba(19, 4, 221, 0.2);
        }
        h1 {
            color: #27ae60;
            font-size: 28px;
        }
        p {
            font-size: 18px;
        }
        button {
            margin-top: 20px;
            padding: 10px 20px;
            border: none;
            background: #27ae60;
            color: #fff;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background: #1e874b;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>Application Submitted!</h1>
        <p>Your application has been sent successfully.</p>
        <button onclick="window.close()">Close</button>
    </div>
</body>
</html>
